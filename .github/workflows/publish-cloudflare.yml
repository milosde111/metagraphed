name: Publish Cloudflare Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      METAGRAPH_KV_NAMESPACE_ID: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build artifacts
        run: npm run build

      - name: Generate R2 manifest
        run: npm run r2:manifest

      - name: Validate registry
        run: npm run validate

      - name: Test
        run: npm test

      - name: Validate Cloudflare backend
        run: |
          npm run validate:schemas
          npm run validate:api
          npm run validate:intake
          npm run validate:workflows
          npm run r2:manifest:dry-run
          npm run r2:download:dry-run
          npm run kv:publish:dry-run
          npm run worker:deploy:dry-run

      - name: Public-safety scan
        run: npm run scan:public-safety

      - name: Upload artifact history to R2
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npm run r2:upload
        env:
          METAGRAPH_ALLOW_R2_UPLOAD: "1"

      - name: Publish KV latest pointer
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.METAGRAPH_KV_NAMESPACE_ID != ''
        run: npm run kv:publish
        env:
          METAGRAPH_ALLOW_KV_WRITE: "1"

      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx --yes wrangler deploy
